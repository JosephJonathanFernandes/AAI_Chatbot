[pytest]
# Pytest configuration for College AI Assistant

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    slow: Tests that take significant time
    manual: Manual testing scenarios
    edge_case: Edge case and error handling tests
    performance: Performance and stress tests

# Test paths
testpaths = tests

# Timeout for individual tests (seconds)
timeout = 300

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ *.egg .streamlit

# Coverage options
[coverage:run]
source = .
omit = 
    tests/*
    setup.py
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
